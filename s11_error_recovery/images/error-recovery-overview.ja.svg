<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 760 440"><defs><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#dc2626"/></linearGradient><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#555" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-red" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#dc2626" d="M 0 0 L 10 5 L 0 10 z"/></marker><linearGradient id="l1" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/></linearGradient><linearGradient id="l2" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#fdba74"/></linearGradient><linearGradient id="l3" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#fecaca"/><stop offset="100%" stop-color="#fca5a5"/></linearGradient></defs><rect width="760" height="440" fill="#fafbfc" rx="8"/><rect width="760" height="44" x="0" y="0" fill="url(#header)" rx="8"/><rect width="760" height="8" x="0" y="36" fill="url(#header)"/><text x="380" y="28" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Error Recovery — try/except で LLM 呼び出しをラップ、3 つの復旧モード</text><rect width="12" height="10" x="40" y="56" fill="#f0f4ff" stroke="#2563eb" stroke-width="1" rx="2"/><text x="58" y="66" fill="#2563eb" font-size="10" font-weight="600">s10 維持</text><rect width="12" height="10" x="140" y="56" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="2"/><text x="158" y="66" fill="#d97706" font-size="10" font-weight="600">s11 新規</text><rect width="80" height="40" x="30" y="92" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="70" y="116" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">messages</text><line x1="110" x2="128" y1="112" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="90" height="52" x="131" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="176" y="108" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">prompt assembly</text><text x="176" y="122" fill="#94a3b8" font-size="8" text-anchor="middle">(s10)</text><line x1="221" x2="239" y1="112" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="100" height="52" x="242" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="292" y="108" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">compress + load</text><text x="292" y="122" fill="#94a3b8" font-size="8" text-anchor="middle">(s08-s09)</text><line x1="342" x2="360" y1="112" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="80" height="52" x="363" y="86" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="8"/><text x="403" y="108" fill="#991b1b" font-size="11" font-weight="700" text-anchor="middle">LLM</text><text x="403" y="122" fill="#dc2626" font-size="8" text-anchor="middle">try/except</text><line x1="443" x2="461" y1="112" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="110" height="52" x="464" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="519" y="108" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">TOOL_HANDLERS</text><text x="519" y="122" fill="#94a3b8" font-size="8" text-anchor="middle">bash · read · write</text><path fill="none" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)" d="M 403 138 L 403 178"/><text x="415" y="164" fill="#dc2626" font-size="9">エラー</text><rect width="720" height="22" x="20" y="182" fill="#f1f5f9" rx="4"/><text x="55" y="197" fill="#64748b" font-size="11" font-weight="600">エラー復旧（分類処理、復旧後 LLM に戻りリトライ）</text><rect width="680" height="48" x="40" y="210" fill="url(#l1)" stroke="#d97706" stroke-width="1.5" rx="7"/><text x="60" y="230" fill="#92400e" font-size="12" font-weight="600">パス 1</text><text x="112" y="230" fill="#92400e" font-size="11" font-weight="700">max_tokens</text><text x="200" y="230" fill="#92400e" font-size="11">出力が途切れた → 8K→64K に拡張（1 回）/ 続行プロンプト（最大 3 回）</text><text x="200" y="246" fill="#b45309" font-size="9">トリガー: stop_reason == &quot;max_tokens&quot; · コスト: 0-1 API · 復旧後 continue</text><rect width="680" height="48" x="40" y="266" fill="url(#l2)" stroke="#ea580c" stroke-width="1.5" rx="7"/><text x="60" y="286" fill="#9a3412" font-size="12" font-weight="600">パス 2</text><text x="112" y="286" fill="#9a3412" font-size="11" font-weight="700">prompt_too_long</text><text x="230" y="286" fill="#9a3412" font-size="11">コンテキスト超過 → reactive compact → リトライ（1 回のみ）</text><text x="200" y="302" fill="#c2410c" font-size="9">トリガー: API が 413 返却 · コスト: 1 API · 圧縮後も超過 → 終了</text><rect width="680" height="48" x="40" y="322" fill="url(#l3)" stroke="#dc2626" stroke-width="1.5" rx="7"/><text x="60" y="342" fill="#991b1b" font-size="12" font-weight="600">パス 3</text><text x="112" y="342" fill="#991b1b" font-size="11" font-weight="700">429/529</text><text x="170" y="342" fill="#991b1b" font-size="11">一時障害 → 指数バックオフ + ジッター（最大 10 回）/ 3 回 529 → モデル切替</text><text x="200" y="358" fill="#b91c1c" font-size="9">トリガー: RateLimitError / OverloadedError · 式: min(500×2^n, 32s) + jitter</text><rect width="680" height="40" x="40" y="388" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><text x="60" y="406" fill="#475569" font-size="10">最も一般的な 3 つの復旧モード。CC は実際に 13+ の reason code を持ち（image_error, aborted_streaming 等）、それぞれ専用の処理がある。</text><text x="60" y="422" fill="#94a3b8" font-size="9">全パス復旧後 → continue で LLM に戻る · 正常フロー: ツール結果 → messages → ループ</text></svg>