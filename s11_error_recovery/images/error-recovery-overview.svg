<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 760 440"><defs><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#dc2626"/></linearGradient><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#555" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-red" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#dc2626" d="M 0 0 L 10 5 L 0 10 z"/></marker><linearGradient id="l1" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/></linearGradient><linearGradient id="l2" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#fdba74"/></linearGradient><linearGradient id="l3" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#fecaca"/><stop offset="100%" stop-color="#fca5a5"/></linearGradient></defs><rect width="760" height="440" fill="#fafbfc" rx="8"/><rect width="760" height="44" x="0" y="0" fill="url(#header)" rx="8"/><rect width="760" height="8" x="0" y="36" fill="url(#header)"/><text x="380" y="28" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Error Recovery — try/except 包裹 LLM 调用，三种恢复模式</text><rect width="12" height="10" x="40" y="56" fill="#f0f4ff" stroke="#2563eb" stroke-width="1" rx="2"/><text x="58" y="66" fill="#2563eb" font-size="10" font-weight="600">s10 保留</text><rect width="12" height="10" x="140" y="56" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="2"/><text x="158" y="66" fill="#d97706" font-size="10" font-weight="600">s11 新增</text><rect width="80" height="40" x="30" y="92" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="70" y="116" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">messages</text><line x1="110" x2="128" y1="112" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="90" height="52" x="131" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="176" y="108" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">prompt assembly</text><text x="176" y="122" fill="#94a3b8" font-size="8" text-anchor="middle">(s10)</text><line x1="221" x2="239" y1="112" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="100" height="52" x="242" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="292" y="108" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">compress + load</text><text x="292" y="122" fill="#94a3b8" font-size="8" text-anchor="middle">(s08-s09)</text><line x1="342" x2="360" y1="112" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="80" height="52" x="363" y="86" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="8"/><text x="403" y="108" fill="#991b1b" font-size="11" font-weight="700" text-anchor="middle">LLM</text><text x="403" y="122" fill="#dc2626" font-size="8" text-anchor="middle">try/except</text><line x1="443" x2="461" y1="112" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="110" height="52" x="464" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="519" y="108" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">TOOL_HANDLERS</text><text x="519" y="122" fill="#94a3b8" font-size="8" text-anchor="middle">bash · read · write</text><path fill="none" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)" d="M 403 138 L 403 178"/><text x="415" y="164" fill="#dc2626" font-size="9">报错</text><rect width="720" height="22" x="20" y="182" fill="#f1f5f9" rx="4"/><text x="55" y="197" fill="#64748b" font-size="11" font-weight="600">错误恢复（分类处理，恢复后回到 LLM 重试）</text><rect width="680" height="48" x="40" y="210" fill="url(#l1)" stroke="#d97706" stroke-width="1.5" rx="7"/><text x="60" y="230" fill="#92400e" font-size="12" font-weight="600">路径 1</text><text x="112" y="230" fill="#92400e" font-size="11" font-weight="700">max_tokens</text><text x="200" y="230" fill="#92400e" font-size="11">输出被截断 → 升级 8K→64K（一次）/ 续写提示（最多 3 次）</text><text x="200" y="246" fill="#b45309" font-size="9">触发: stop_reason == &quot;max_tokens&quot; · 代价: 0-1 API · 恢复后 continue</text><rect width="680" height="48" x="40" y="266" fill="url(#l2)" stroke="#ea580c" stroke-width="1.5" rx="7"/><text x="60" y="286" fill="#9a3412" font-size="12" font-weight="600">路径 2</text><text x="112" y="286" fill="#9a3412" font-size="11" font-weight="700">prompt_too_long</text><text x="230" y="286" fill="#9a3412" font-size="11">上下文超限 → reactive compact → 重试（一次机会）</text><text x="200" y="302" fill="#c2410c" font-size="9">触发: API 返回 413 · 代价: 1 API · 压缩过还是超 → 退出</text><rect width="680" height="48" x="40" y="322" fill="url(#l3)" stroke="#dc2626" stroke-width="1.5" rx="7"/><text x="60" y="342" fill="#991b1b" font-size="12" font-weight="600">路径 3</text><text x="112" y="342" fill="#991b1b" font-size="11" font-weight="700">429/529</text><text x="170" y="342" fill="#991b1b" font-size="11">临时故障 → 指数退避 + 抖动（最多 10 次）/ 3 次 529 → 切换模型</text><text x="200" y="358" fill="#b91c1c" font-size="9">触发: RateLimitError / OverloadedError · 公式: min(500×2^n, 32s) + jitter</text><rect width="680" height="40" x="40" y="388" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><text x="60" y="406" fill="#475569" font-size="10">三种最常见的恢复模式。CC 实际有 13+ reason code（image_error、aborted_streaming 等），各有专门处理。</text><text x="60" y="422" fill="#94a3b8" font-size="9">所有路径恢复后 → continue 回到 LLM · 正常流程: 工具结果 → messages → 循环</text></svg>