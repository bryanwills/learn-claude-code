<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 720 380"><defs><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#7c3aed" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs><rect width="720" height="380" fill="#fafbfc" rx="8"/><rect width="720" height="38" x="0" y="0" fill="url(#header)" rx="8"/><rect width="720" height="8" x="0" y="30" fill="url(#header)"/><text x="360" y="25" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Memory System — 存储 · 加载 · 提取 · 整理</text><rect width="145" height="80" x="40" y="58" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="8"/><text x="112" y="80" fill="#5b21b6" font-size="13" font-weight="700" text-anchor="middle">存储</text><line x1="55" x2="170" y1="90" y2="90" stroke="#c4b5fd" stroke-width=".5"/><text x="55" y="108" fill="#5b21b6" font-size="10">.memory/*.md 文件</text><text x="55" y="124" fill="#5b21b6" font-size="10">MEMORY.md 索引</text><line x1="190" x2="218" y1="98" y2="98" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="200" height="80" x="222" y="58" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="8"/><text x="322" y="80" fill="#5b21b6" font-size="13" font-weight="700" text-anchor="middle">加载</text><line x1="237" x2="407" y1="90" y2="90" stroke="#c4b5fd" stroke-width=".5"/><text x="237" y="108" fill="#5b21b6" font-size="10">索引常驻 SYSTEM</text><text x="237" y="124" fill="#5b21b6" font-size="10">LLM side-query 选文件</text><text x="237" y="134" fill="#a78bfa" font-size="9">≤ 5 条，失败降级到关键词</text><line x1="425" x2="453" y1="98" y2="98" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="130" height="80" x="457" y="58" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2" rx="8"/><text x="522" y="80" fill="#5b21b6" font-size="13" font-weight="700" text-anchor="middle">提取</text><line x1="472" x2="572" y1="90" y2="90" stroke="#c4b5fd" stroke-width=".5"/><text x="472" y="108" fill="#5b21b6" font-size="10">每轮结束后触发</text><text x="472" y="124" fill="#5b21b6" font-size="10">LLM 提取偏好/约束</text><text x="472" y="134" fill="#a78bfa" font-size="9">检查已有，避免重复</text><rect width="100" height="80" x="600" y="58" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" rx="8"/><text x="650" y="80" fill="#5b21b6" font-size="13" font-weight="700" text-anchor="middle">整理</text><line x1="615" x2="685" y1="90" y2="90" stroke="#c4b5fd" stroke-width=".5"/><text x="615" y="108" fill="#5b21b6" font-size="10">文件 ≥ 10 触发</text><text x="615" y="124" fill="#5b21b6" font-size="10">去重·合并·剪枝</text><text x="615" y="134" fill="#a78bfa" font-size="9">CC: 三层门控</text><rect width="660" height="36" x="40" y="180" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="4 2" stroke-width="1" rx="6"/><text x="370" y="203" fill="#475569" font-size="11" text-anchor="middle">.memory/ — MEMORY.md 索引 + *.md 文件（YAML frontmatter: name / description / type）</text><path fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" d="M 112 138 L 112 180"/><text x="120" y="162" fill="#7c3aed" font-size="9">写入/读取</text><path fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" d="M 522 138 L 522 180"/><text x="536" y="164" fill="#7c3aed" font-size="9">写入</text><path fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" d="M 650 138 L 650 180"/><text x="662" y="164" fill="#7c3aed" font-size="9">覆写</text><rect width="660" height="40" x="40" y="240" fill="#faf5ff" stroke="#c4b5fd" stroke-width=".5" rx="6"/><text x="60" y="260" fill="#5b21b6" font-size="10" font-weight="600">四类记忆：</text><text x="140" y="260" fill="#475569" font-size="10">user（你是谁）· feedback（怎么做事）· project（正在发生什么）· reference（东西在哪找）</text><rect width="660" height="72" x="40" y="296" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><text x="60" y="316" fill="#5b21b6" font-size="11" font-weight="600">CC 源码对照</text><text x="60" y="334" fill="#475569" font-size="10">• 记忆选择：LLM side-query（Sonnet 选），不是 embedding 向量相似度</text><text x="60" y="350" fill="#475569" font-size="10">• 提取时机：stop hook 中触发（每轮结束后），不是 autoCompact 后</text><text x="60" y="366" fill="#475569" font-size="10">• Dream 整理：三层门控（时间 ≥ 24h + 会话 ≥ 5 + 文件锁），不是简单计数</text></svg>