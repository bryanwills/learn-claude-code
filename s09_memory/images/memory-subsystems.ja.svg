<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 720 380"><defs><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#7c3aed" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs><rect width="720" height="380" fill="#fafbfc" rx="8"/><rect width="720" height="38" x="0" y="0" fill="url(#header)" rx="8"/><rect width="720" height="8" x="0" y="30" fill="url(#header)"/><text x="360" y="25" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Memory System — ストレージ · 読み込み · 抽出 · 整理</text><rect width="145" height="80" x="40" y="58" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="8"/><text x="112" y="80" fill="#5b21b6" font-size="13" font-weight="700" text-anchor="middle">ストレージ</text><line x1="55" x2="170" y1="90" y2="90" stroke="#c4b5fd" stroke-width=".5"/><text x="55" y="108" fill="#5b21b6" font-size="10">.memory/*.md ファイル</text><text x="55" y="124" fill="#5b21b6" font-size="10">MEMORY.md インデックス</text><line x1="190" x2="218" y1="98" y2="98" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="200" height="80" x="222" y="58" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="8"/><text x="322" y="80" fill="#5b21b6" font-size="13" font-weight="700" text-anchor="middle">読み込み</text><line x1="237" x2="407" y1="90" y2="90" stroke="#c4b5fd" stroke-width=".5"/><text x="237" y="108" fill="#5b21b6" font-size="10">インデックスを SYSTEM に常駐</text><text x="237" y="124" fill="#5b21b6" font-size="10">LLM side-query でファイル選択</text><text x="237" y="134" fill="#a78bfa" font-size="9">≤ 5 件、失敗時はキーワードに降格</text><line x1="425" x2="453" y1="98" y2="98" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="130" height="80" x="457" y="58" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2" rx="8"/><text x="522" y="80" fill="#5b21b6" font-size="13" font-weight="700" text-anchor="middle">抽出</text><line x1="472" x2="572" y1="90" y2="90" stroke="#c4b5fd" stroke-width=".5"/><text x="472" y="106" fill="#5b21b6" font-size="9.5">毎ターン終了後</text><text x="472" y="121" fill="#5b21b6" font-size="9.5">好み/制約を抽出</text><text x="472" y="134" fill="#a78bfa" font-size="8.5">重複を回避</text><rect width="100" height="80" x="600" y="58" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" rx="8"/><text x="650" y="80" fill="#5b21b6" font-size="13" font-weight="700" text-anchor="middle">整理</text><line x1="615" x2="685" y1="90" y2="90" stroke="#c4b5fd" stroke-width=".5"/><text x="615" y="106" fill="#5b21b6" font-size="9.5">≥ 10 ファイル</text><text x="615" y="121" fill="#5b21b6" font-size="9.5">重複排除・統合</text><text x="615" y="134" fill="#a78bfa" font-size="8.5">CC: Dream ゲート</text><rect width="660" height="36" x="40" y="180" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="4 2" stroke-width="1" rx="6"/><text x="370" y="203" fill="#475569" font-size="11" text-anchor="middle">.memory/ — MEMORY.md インデックス + *.md ファイル（YAML frontmatter: name / description / type）</text><path fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" d="M 112 138 L 112 180"/><text x="120" y="162" fill="#7c3aed" font-size="9">読み/書き</text><path fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" d="M 522 138 L 522 180"/><text x="536" y="164" fill="#7c3aed" font-size="9">書き込み</text><path fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" d="M 650 138 L 650 180"/><text x="662" y="164" fill="#7c3aed" font-size="9">上書き</text><rect width="660" height="40" x="40" y="240" fill="#faf5ff" stroke="#c4b5fd" stroke-width=".5" rx="6"/><text x="60" y="260" fill="#5b21b6" font-size="10" font-weight="600">4 種類の記憶：</text><text x="148" y="260" fill="#475569" font-size="10">user（あなたは誰か）· feedback（どう作業するか）· project（何が起きているか）· reference（どこで探すか）</text><rect width="660" height="72" x="40" y="296" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><text x="60" y="316" fill="#5b21b6" font-size="11" font-weight="600">CC ソースコード対照</text><text x="60" y="334" fill="#475569" font-size="10">• 記憶選択：LLM side-query（Sonnet が選択）、embedding ベクトル類似度ではない</text><text x="60" y="350" fill="#475569" font-size="10">• 抽出タイミング：stop hook（毎ターン終了後）、autoCompact 後ではない</text><text x="60" y="365" fill="#475569" font-size="10">• Dream：時間・セッション・ロックで判定</text></svg>