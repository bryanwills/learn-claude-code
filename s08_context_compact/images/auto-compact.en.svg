<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 720 400"><defs><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#991b1b"/><stop offset="100%" stop-color="#dc2626"/></linearGradient><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#dc2626" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs><rect width="720" height="400" fill="#fafbfc" rx="8"/><rect width="720" height="38" x="0" y="0" fill="url(#header)" rx="8"/><rect width="720" height="8" x="0" y="30" fill="url(#header)"/><text x="360" y="25" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">L4: autoCompact — LLM Full Summary</text><rect width="680" height="44" x="20" y="54" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" rx="6"/><text x="35" y="70" fill="#991b1b" font-size="11" font-weight="600">Trigger Condition</text><text x="140" y="70" fill="#991b1b" font-size="11">All three preprocessing layers have run, estimated tokens &gt; contextWindow - maxOutputTokens - 13_000.</text><text x="140" y="86" fill="#991b1b" font-size="10">Tries sessionMemoryCompact first (lightweight summary from existing memory), only calls LLM if insufficient.</text><rect width="200" height="110" x="20" y="106" fill="#fff" stroke="#94a3b8" stroke-width="1.5" rx="8"/><text x="120" y="130" fill="#1e3a5f" font-size="12" font-weight="700" text-anchor="middle">Step 1: Save transcript</text><text x="40" y="152" fill="#475569" font-size="10">Write conversation to .transcripts/</text><text x="40" y="168" fill="#475569" font-size="10">One JSONL message per line</text><text x="40" y="184" fill="#475569" font-size="10">File: transcript_{time}.jsonl</text><text x="40" y="200" fill="#94a3b8" font-size="9">Full transcript stays on disk</text><line x1="225" x2="265" y1="161" y2="161" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/><rect width="200" height="110" x="270" y="106" fill="#fff" stroke="#94a3b8" stroke-width="1.5" rx="8"/><text x="370" y="130" fill="#1e3a5f" font-size="12" font-weight="700" text-anchor="middle">Step 2: LLM generates summary</text><text x="290" y="152" fill="#475569" font-size="10">Send conversation history to LLM</text><text x="290" y="166" fill="#475569" font-size="9">Summary must include 9 sections:</text><text x="370" y="180" fill="#94a3b8" font-size="8" text-anchor="middle">request · concepts · files · errors</text><text x="370" y="192" fill="#94a3b8" font-size="8" text-anchor="middle">resolutions · user messages · todos</text><text x="370" y="204" fill="#94a3b8" font-size="8" text-anchor="middle">current state · next steps</text><line x1="475" x2="515" y1="161" y2="161" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/><rect width="180" height="110" x="520" y="106" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="8"/><text x="610" y="130" fill="#991b1b" font-size="12" font-weight="700" text-anchor="middle">Step 3: Replace message list</text><text x="540" y="152" fill="#991b1b" font-size="10">All old messages → 1 summary</text><text x="540" y="168" fill="#991b1b" font-size="10">Model continues from summary</text><text x="540" y="184" fill="#991b1b" font-size="10">Includes recently_read file list</text><text x="540" y="200" fill="#ef4444" font-size="9">⚠ This is an irreversible operation</text><rect width="320" height="94" x="20" y="234" fill="#fff" stroke="#94a3b8" stroke-width="1" rx="6"/><text x="180" y="256" fill="#64748b" font-size="11" font-weight="600" text-anchor="middle">Before messages</text><rect width="52" height="16" x="35" y="264" fill="#e2e8f0" rx="3"/><text x="40" y="276" fill="#475569" font-size="8">user</text><rect width="52" height="16" x="92" y="264" fill="#e2e8f0" rx="3"/><text x="97" y="276" fill="#475569" font-size="8">assistant</text><rect width="52" height="16" x="149" y="264" fill="#e2e8f0" rx="3"/><text x="154" y="276" fill="#475569" font-size="8">user</text><rect width="52" height="16" x="206" y="264" fill="#e2e8f0" rx="3"/><text x="211" y="276" fill="#475569" font-size="8">assistant</text><rect width="52" height="16" x="263" y="264" fill="#e2e8f0" rx="3"/><text x="268" y="276" fill="#475569" font-size="8">user</text><text x="180" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">~180 messages, occupying 62K tokens</text><line x1="345" x2="375" y1="281" y2="281" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/><rect width="320" height="94" x="380" y="234" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="6"/><text x="540" y="256" fill="#991b1b" font-size="11" font-weight="600" text-anchor="middle">After messages</text><rect width="290" height="32" x="395" y="264" fill="#fee2e2" stroke="#fca5a5" stroke-width=".5" rx="4"/><text x="540" y="276" fill="#991b1b" font-size="9" text-anchor="middle">[Compacted] Summary: goal → create hello.py ...</text><text x="540" y="290" fill="#991b1b" font-size="9" text-anchor="middle">Recent files: hello.py, README.md ...</text><text x="540" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">~1 message, occupying 1K tokens</text><rect width="680" height="36" x="20" y="340" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="6"/><text x="35" y="362" fill="#475569" font-size="11" font-weight="600">Circuit breaker:</text><text x="130" y="362" fill="#475569" font-size="10">3 consecutive autocompact failures → stop retrying. Prevents wasting API calls when context is unrecoverable.</text></svg>