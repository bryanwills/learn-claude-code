hor="middle">messages</text><line x1="177" x2="191" y1="110" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="80" height="48" x="194" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="234" y="114" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">prompt</text><line x1="274" x2="288" y1="110" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="70" height="48" x="291" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="326" y="114" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">LLM</text><line x1="361" x2="375" y1="110" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="356" height="60" x="378" y="80" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="556" y="98" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">TOOL DISPATCH（s16 全保持）</text><text x="394" y="114" fill="#2563eb" font-size="8">bash · read · write · task(4) · send · inbox</text><text x="394" y="128" fill="#7c3aed" font-size="8" font-weight="700">★ request_shutdown · request_plan · review_plan</text><path fill="none" stroke="#94a3b8" stroke-dasharray="5 4" stroke-width="1" marker-end="url(#arrow)" d="M 734 110 L 748 110 L 748 150 L 55 150 L 55 130"/><path fill="none" stroke="#059669" stroke-dasharray="5 3" stroke-width="1.5" marker-end="url(#arrow-green)" d="M 326 134 L 326 160 L 170 160 L 170 210"/><text x="248" y="156" fill="#059669" font-size="8" font-weight="600" text-anchor="middle">同じ内側 LLM/tool loop を WORK に入れる</text><rect width="700" height="195" x="30" y="172" fill="#ecfdf5" stroke="#059669" stroke-width="2" rx="8"/><text x="380" y="194" fill="#065f46" font-size="11" font-weight="700" text-anchor="middle">チームメイトライフサイクル（s17 新規：WORK → IDLE → SHUTDOWN）</text><rect width="230" height="100" x="55" y="210" fill="#fff" stroke="#059669" stroke-width="1.5" rx="6"/><text x="170" y="230" fill="#059669" font-size="10" font-weight="700" text-anchor="middle">WORK フェーズ</text><text x="70" y="248" fill="#374151" font-size="8">内側ループ：inbox → LLM → bash / read / write</text><text x="70" y="262" fill="#374151" font-size="8">stop_reason == tool_use → ループ</text><text x="70" y="276" fill="#374151" font-size="8">stop_reason != tool_use → IDLE</text><text x="70" y="298" fill="#6b7280" font-size="7">最大 10 ラウンド / shutdown_request で中断可能</text><line x1="285" x2="415" y1="260" y2="260" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/><text x="350" y="253" fill="#059669" font-size="8" font-weight="600" text-anchor="middle">タスク完了</text><path fill="none" stroke="#059669" stroke-dasharray="5 3" stroke-width="1.5" marker-end="url(#arrow-green)" d="M 415 232 C 375 200, 320 200, 285 232"/><text x="350" y="208" fill="#059669" font-size="8" font-weight="600" text-anchor="middle">仕事を発見</text><rect width="295" height="100" x="418" y="210" fill="#fff" stroke="#059669" stroke-width="1.5" rx="6"/><text x="565" y="230" fill="#059669" font-size="10" font-weight="700" text-anchor="middle">IDLE フェーズ（5 秒ごとにポーリング）</text><text x="433" y="248" fill="#374151" font-size="8">├ inbox チェック → メッセージあり → WORK に戻る</text><text x="433" y="264" fill="#374151" font-size="8">├ scan_unclaimed_tasks → 認領 → WORK に戻る</text><text x="433" y="280" fill="#374151" font-size="8">└ 60 秒タイムアウト → SHUTDOWN ↓</text><text x="433" y="298" fill="#6b7280" font-size="7">idle_poll() + claim_task()</text><rect width="130" height="24" x="515" y="335" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" rx="6"/><text x="580" y="351" fill="#991b1b" font-size="9" font-weight="700" text-anchor="middle">SHUTDOWN</text><line x1="580" x2="580" y1="310" y2="335" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/><text x="598" y="326" fill="#dc2626" font-size="7">60 秒タイムアウト</text><rect width="700" height="42" x="30" y="388" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><rect width="12" height="10" x="50" y="400" fill="#f0f4ff" stroke="#2563eb" stroke-width="1" rx="2"/><text x="70" y="410" fill="#475569" font-size="10">s16: MessageBus + protocols + request_shutdown + plan approval</text><rect width="12" height="10" x="50" y="414" fill="#ecfdf5" stroke="#059669" stroke-width="1" rx="2"/><text x="70" y="424" fill="#475569" font-size="10">s17: idle_poll + scan_unclaimed_tasks + auto_claim + identity re-injection</text><rect width="700" height="22" x="30" y="442" fill="#ecfdf5" stroke="#059669" stroke-width="1" rx="4"/><text x="380" y="457" fill="#065f46" font-size="9" text-anchor="middle">Lead ツール不変（14） · チームメイトツール 5 → 8（+3 task tools） · チームメイトが自己認領、Lead はタスク作成のみ</text></svg>