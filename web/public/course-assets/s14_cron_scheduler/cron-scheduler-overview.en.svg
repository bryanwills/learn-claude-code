<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 760 480"><defs><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#555" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-indigo" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#4f46e5" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs><rect width="760" height="480" fill="#fafbfc" rx="8"/><rect width="760" height="44" x="0" y="0" fill="url(#header)" rx="8"/><rect width="760" height="8" x="0" y="36" fill="url(#header)"/><text x="380" y="28" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Cron Scheduler — Independent scheduler thread + cron_queue injection point</text><rect width="12" height="10" x="40" y="56" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" rx="2"/><text x="58" y="66" fill="#64748b" font-size="10" font-weight="600">s10-s13 retained</text><rect width="12" height="10" x="160" y="56" fill="#eef2ff" stroke="#4f46e5" stroke-width="1" rx="2"/><text x="178" y="66" fill="#4f46e5" font-size="10" font-weight="600">s14 new</text><rect width="95" height="48" x="30" y="100" fill="#eef2ff" stroke="#4f46e5" stroke-width="2" rx="8"/><text x="77" y="120" fill="#312e81" font-size="9" font-weight="700" text-anchor="middle">consume</text><text x="77" y="134" fill="#312e81" font-size="9" font-weight="700" text-anchor="middle">cron_queue</text><text x="77" y="144" fill="#94a3b8" font-size="7" text-anchor="middle">★ s14 injection</text><line x1="125" x2="143" y1="124" y2="124" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="80" height="48" x="146" y="100" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2" rx="8"/><text x="186" y="128" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">messages</text><line x1="226" x2="244" y1="124" y2="124" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="115" height="60" x="247" y="94" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2" rx="8"/><text x="304" y="116" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">prompt + cache</text><text x="304" y="130" fill="#94a3b8" font-size="8" text-anchor="middle">assemble_system_prompt</text><text x="304" y="142" fill="#94a3b8" font-size="8" text-anchor="middle">(s10)</text><line x1="362" x2="380" y1="124" y2="124" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="100" height="60" x="383" y="94" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2" rx="8"/><text x="433" y="116" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">LLM (try/except)</text><text x="433" y="130" fill="#94a3b8" font-size="8" text-anchor="middle">with_retry</text><text x="433" y="142" fill="#94a3b8" font-size="8" text-anchor="middle">(s11)</text><line x1="483" x2="501" y1="124" y2="124" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="220" height="72" x="504" y="88" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2" rx="8"/><text x="614" y="106" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">TOOL DISPATCH</text><text x="519" y="122" fill="#2563eb" font-size="8">fast → sync (bash, read, write)</text><text x="519" y="134" fill="#ea580c" font-size="8">slow → background thread (s13)</text><text x="519" y="146" fill="#4f46e5" font-size="8" font-weight="600">cron → schedule_cron, list, cancel (s14)</text><text x="519" y="156" fill="#2563eb" font-size="8">task → create, list, claim, complete (s12)</text><path fill="none" stroke="#94a3b8" stroke-dasharray="5 4" stroke-width="1" marker-end="url(#arrow)" d="M 724 124 L 748 124 L 748 170 L 77 170 L 77 148"/><text x="400" y="183" fill="#94a3b8" font-size="9" text-anchor="middle">loop back: tool_results → next turn</text><rect width="250" height="90" x="30" y="206" fill="#eef2ff" stroke="#4f46e5" stroke-width="2" rx="8"/><text x="155" y="226" fill="#312e81" font-size="11" font-weight="700" text-anchor="middle">cron_scheduler_loop (daemon thread)</text><text x="48" y="244" fill="#4f46e5" font-size="9">time.sleep(1) → cron_matches(job.cron, now)</text><text x="48" y="258" fill="#4f46e5" font-size="9">match → cron_queue.append(job)</text><text x="48" y="272" fill="#6b7280" font-size="8">minute_marker prevents double-fire per minute</text><text x="48" y="286" fill="#6b7280" font-size="8">one-shot jobs auto-delete after firing</text><path fill="none" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrow-indigo)" d="M 155 296 L 155 330"/><rect width="200" height="38" x="60" y="333" fill="#eef2ff" stroke="#4f46e5" stroke-width="2" rx="8"/><text x="160" y="352" fill="#312e81" font-size="10" font-weight="700" text-anchor="middle">cron_queue</text><text x="160" y="364" fill="#4f46e5" font-size="8" text-anchor="middle">cron_lock · scheduler writes · loop reads</text><path fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-indigo)" d="M 77 333 L 77 318 L 18 318 L 18 124 L 30 124"/><text x="95" y="313" fill="#4f46e5" font-size="8" font-weight="600" text-anchor="middle">next agent_loop consumes</text><rect width="410" height="90" x="320" y="206" fill="#eef2ff" stroke="#4f46e5" stroke-width="2" rx="8"/><text x="525" y="226" fill="#312e81" font-size="11" font-weight="700" text-anchor="middle">CronJob + Persistence</text><text x="338" y="244" fill="#4f46e5" font-size="9" font-weight="600">CronJob dataclass:</text><text x="455" y="244" fill="#6b7280" font-size="8">id, cron, prompt, recurring, durable</text><text x="338" y="260" fill="#4f46e5" font-size="9" font-weight="600">Durable → .scheduled_tasks.json</text><text x="560" y="260" fill="#6b7280" font-size="8">restored via load_durable_jobs after restart</text><text x="338" y="276" fill="#4f46e5" font-size="9" font-weight="600">Session-only → memory only</text><text x="530" y="276" fill="#6b7280" font-size="8">lost when process exits</text><text x="338" y="292" fill="#ef4444" font-size="9" font-weight="600">⚠ Process exit = scheduler stops (not OS-level crontab)</text><rect width="700" height="76" x="30" y="390" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><text x="60" y="412" fill="#1e3a5f" font-size="11" font-weight="600">5-field Cron Expression</text><rect width="52" height="16" x="60" y="422" fill="#eef2ff" stroke="#4f46e5" stroke-width="1" rx="3"/><text x="86" y="434" fill="#4f46e5" font-size="9" text-anchor="middle">*</text><rect width="52" height="16" x="118" y="422" fill="#eef2ff" stroke="#4f46e5" stroke-width="1" rx="3"/><text x="144" y="434" fill="#4f46e5" font-size="9" text-anchor="middle">*</text><rect width="52" height="16" x="176" y="422" fill="#eef2ff" stroke="#4f46e5" stroke-width="1" rx="3"/><text x="202" y="434" fill="#4f46e5" font-size="9" text-anchor="middle">*</text><rect width="52" height="16" x="234" y="422" fill="#eef2ff" stroke="#4f46e5" stroke-width="1" rx="3"/><text x="260" y="434" fill="#4f46e5" font-size="9" text-anchor="middle">*</text><rect width="52" height="16" x="292" y="422" fill="#eef2ff" stroke="#4f46e5" stroke-width="1" rx="3"/><text x="318" y="434" fill="#4f46e5" font-size="9" text-anchor="middle">*</text><text x="60" y="455" fill="#94a3b8" font-size="8">min</text><text x="130" y="455" fill="#94a3b8" font-size="8">hour</text><text x="194" y="455" fill="#94a3b8" font-size="8">day</text><text x="254" y="455" fill="#94a3b8" font-size="8">month</text><text x="310" y="455" fill="#94a3b8" font-size="8">dow</text><text x="380" y="434" fill="#475569" font-size="9">*/5 * * * * → every 5 minutes</text><text x="380" y="450" fill="#475569" font-size="9">0 9 * * 1-5 → weekdays 9:00</text><text x="560" y="434" fill="#475569" font-size="9">0 9 * * * → daily 9:00</text><text x="560" y="450" fill="#475569" font-size="9">Supports: *, */N, N, N-M, N,M,...</text></svg>