<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 820 520"><defs><marker id="arrow" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#555" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-blue" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#2563eb" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-amber" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#d97706" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-green" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#16a34a" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-red" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#dc2626" d="M 0 0 L 10 5 L 0 10 z"/></marker><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/></linearGradient></defs><rect width="820" height="520" fill="#fafbfc" rx="8"/><rect width="820" height="48" x="0" y="0" fill="url(#header)" rx="8"/><rect width="820" height="8" x="0" y="40" fill="url(#header)"/><text x="410" y="31" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Context Compact — LLM 呼び出し前に圧縮、3 つのトリガーモード</text><text x="50" y="74" fill="#94a3b8" font-size="11" font-weight="600">s07 保持</text><text x="180" y="74" fill="#d97706" font-size="11" font-weight="600">s08 新規</text><rect width="100" height="52" x="40" y="132" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="90" y="155" fill="#1e3a5f" font-size="12" font-weight="600" text-anchor="middle">messages[]</text><text x="90" y="172" fill="#64748b" font-size="9" text-anchor="middle">(s07 保持)</text><line x1="140" x2="168" y1="158" y2="158" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-amber)"/><rect width="200" height="252" x="170" y="82" fill="#fffbeb" stroke="#d97706" stroke-width="2" rx="10"/><text x="270" y="102" fill="#92400e" font-size="11" font-weight="700" text-anchor="middle">圧縮パイプライン</text><rect width="168" height="16" x="186" y="110" fill="#fde68a" stroke="#d97706" stroke-width=".8" rx="3"/><text x="270" y="122" fill="#92400e" font-size="8" font-weight="700" text-anchor="middle">① 毎ターン自動 · 無条件 · 0 API</text><rect width="168" height="24" x="186" y="130" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="4"/><text x="270" y="146" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">L3 tool_result_budget</text><rect width="168" height="24" x="186" y="158" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="4"/><text x="270" y="174" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">L1 snip_compact</text><rect width="168" height="24" x="186" y="186" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="4"/><text x="270" y="202" fill="#92400e" font-size="10" font-weight="600" text-anchor="middle">L2 micro_compact</text><line x1="270" x2="270" y1="210" y2="222" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/><polygon fill="#f0f4ff" stroke="#ea580c" stroke-width="1.5" points="270 226 300 244 270 262 240 244"/><text x="270" y="247" fill="#9a3412" font-size="7" font-weight="600" text-anchor="middle">閾値超過?</text><text x="306" y="240" fill="#16a34a" font-size="9" font-weight="700">No → 通過</text><text x="306" y="252" fill="#94a3b8" font-size="7">直接 LLM へ</text><text x="284" y="260" fill="#ea580c" font-size="8" font-weight="600">Yes↓</text><rect width="168" height="16" x="186" y="268" fill="#fed7aa" stroke="#ea580c" stroke-width=".8" rx="3"/><text x="270" y="280" fill="#9a3412" font-size="8" font-weight="700" text-anchor="middle">② 条件 · トークン閾値超過 · 1 API</text><rect width="168" height="24" x="186" y="288" fill="#fed7aa" stroke="#ea580c" stroke-width="1" rx="4"/><text x="270" y="304" fill="#9a3412" font-size="10" font-weight="600" text-anchor="middle">L4 compact_history</text><line x1="370" x2="438" y1="158" y2="158" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/><rect width="100" height="52" x="440" y="132" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="490" y="155" fill="#1e3a5f" font-size="14" font-weight="700" text-anchor="middle">LLM</text><text x="490" y="172" fill="#64748b" font-size="9" text-anchor="middle">stop_reason=tool_use?</text><line x1="490" x2="490" y1="184" y2="278" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/><text x="502" y="262" fill="#16a34a" font-size="10" font-weight="600">No</text><rect width="110" height="26" x="435" y="280" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="13"/><text x="490" y="297" fill="#166534" font-size="11" font-weight="600" text-anchor="middle">結果を返す</text><line x1="540" x2="578" y1="158" y2="158" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/><text x="554" y="150" fill="#64748b" font-size="10" font-weight="600">Yes</text><rect width="130" height="64" x="580" y="126" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="645" y="150" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">TOOL_HANDLERS</text><text x="645" y="166" fill="#64748b" font-size="9" text-anchor="middle">bash · read · write</text><text x="645" y="180" fill="#64748b" font-size="9" text-anchor="middle">task · load_skill · ...</text><path fill="none" stroke="#dc2626" stroke-dasharray="4 3" stroke-width="1.5" marker-end="url(#arrow-red)" d="M 535 184 L 570 216 L 580 228"/><text x="552" y="204" fill="#991b1b" font-size="8" font-weight="600">API 例外</text><path fill="none" stroke="#dc2626" stroke-dasharray="4 3" stroke-width="1.5" marker-end="url(#arrow-red)" d="M 665 266 L 665 340 L 160 340 L 160 142 L 186 142"/><text x="530" y="328" fill="#991b1b" font-size="8" font-weight="600">圧縮パイプラインへ再試行</text><rect width="170" height="56" x="580" y="210" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="4 2" stroke-width="1" rx="6"/><text x="665" y="228" fill="#991b1b" font-size="9" font-weight="700" text-anchor="middle">③ 緊急トリガー</text><text x="665" y="242" fill="#991b1b" font-size="8" text-anchor="middle">API が prompt_too_long を返す</text><text x="665" y="256" fill="#991b1b" font-size="8" text-anchor="middle">→ reactive_compact → リトライ</text><path fill="none" stroke="#555" stroke-dasharray="6 3" stroke-width="2" marker-end="url(#arrow)" d="M 710 158 L 760 158 L 760 348 L 90 348 L 90 184"/><text x="410" y="366" fill="#64748b" font-size="10" text-anchor="middle">ツール結果を messages[] に追加 → 次ターン → 再圧縮 → LLM</text><rect width="720" height="116" x="50" y="390" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><rect width="16" height="12" x="70" y="404" fill="#f0f4ff" stroke="#2563eb" stroke-width="1" rx="3"/><text x="94" y="414" fill="#334155" font-size="10">s07 保持：ループ、フック、スキルロード、サブエージェント</text><rect width="16" height="12" x="70" y="426" fill="#fde68a" stroke="#d97706" stroke-width="1" rx="3"/><text x="94" y="436" fill="#334155" font-size="10">① 毎ターン自動：L3→L1→L2 が各 LLM 呼び出し前に無条件実行、0 API</text><rect width="16" height="12" x="70" y="448" fill="#fed7aa" stroke="#ea580c" stroke-width="1" rx="3"/><text x="94" y="458" fill="#334155" font-size="10">② 条件トリガー：L3/L1/L2 後もトークン超過 → compact_history、1 API</text><rect width="16" height="12" x="70" y="470" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="3 2" stroke-width="1" rx="3"/><text x="94" y="480" fill="#334155" font-size="10">③ 緊急トリガー：API が prompt_too_long を返す → reactive_compact → リトライ</text><text x="70" y="498" fill="#94a3b8" font-size="9">3 つのモードはコスト増加：0 API → 1 API → 1 API + より積極的なトリム</text></svg>