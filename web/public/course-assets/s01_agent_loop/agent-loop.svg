<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 720 530"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#555" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-blue" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#2563eb" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-green" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#16a34a" d="M 0 0 L 10 5 L 0 10 z"/></marker><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/></linearGradient></defs><rect width="720" height="530" fill="#fafbfc" rx="8"/><rect width="720" height="48" x="0" y="0" fill="url(#header)" rx="8"/><rect width="720" height="8" x="0" y="40" fill="url(#header)"/><text x="360" y="31" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">Agent Loop — 一个 while 循环驱动整个 Agent</text><rect width="160" height="52" x="60" y="80" fill="#f0f4ff" stroke="#2563eb" stroke-width="2" rx="8"/><text x="140" y="102" fill="#1e3a5f" font-size="13" font-weight="600" text-anchor="middle">用户提问</text><text x="140" y="120" fill="#64748b" font-size="11" text-anchor="middle">&quot;帮我创建 hello.py&quot;</text><line x1="140" x2="140" y1="132" y2="162" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/><rect width="160" height="48" x="60" y="164" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="4 2" stroke-width="1.5" rx="8"/><text x="140" y="185" fill="#334155" font-size="12" font-weight="500" text-anchor="middle">messages[]</text><text x="140" y="201" fill="#94a3b8" font-size="10" text-anchor="middle">累积式消息列表</text><line x1="220" x2="288" y1="188" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="180" height="96" x="290" y="140" fill="#fff" stroke="#2563eb" stroke-width="2" rx="8"/><text x="380" y="166" fill="#1e3a5f" font-size="14" font-weight="700" text-anchor="middle">大模型 (LLM)</text><line x1="310" x2="450" y1="176" y2="176" stroke="#e2e8f0" stroke-width="1"/><text x="380" y="194" fill="#475569" font-size="11" text-anchor="middle">模型阅读消息历史</text><text x="380" y="210" fill="#475569" font-size="11" text-anchor="middle">判断：需要工具吗？</text><text x="380" y="228" fill="#64748b" font-size="10" text-anchor="middle">返回 stop_reason 信号</text><line x1="380" x2="380" y1="236" y2="276" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><polygon fill="#fff8f0" stroke="#d97706" stroke-width="2" points="380 280 470 316 380 352 290 316"/><text x="380" y="312" fill="#92400e" font-size="12" font-weight="600" text-anchor="middle">stop_reason</text><text x="380" y="326" fill="#92400e" font-size="10" text-anchor="middle">== &quot;tool_use&quot;?</text><line x1="470" x2="540" y1="316" y2="316" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/><text x="505" y="308" fill="#16a34a" font-size="10" font-weight="600" text-anchor="middle">否</text><rect width="130" height="44" x="542" y="294" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="22"/><text x="607" y="313" fill="#166534" font-size="12" font-weight="600" text-anchor="middle">返回结果</text><text x="607" y="329" fill="#166534" font-size="10" text-anchor="middle">循环结束</text><line x1="380" x2="380" y1="352" y2="392" stroke="#d97706" stroke-width="2" marker-end="url(#arrow)"/><text x="395" y="376" fill="#d97706" font-size="10" font-weight="600">是</text><rect width="180" height="48" x="290" y="394" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" rx="8"/><text x="380" y="415" fill="#92400e" font-size="12" font-weight="600" text-anchor="middle">执行工具调用</text><text x="380" y="432" fill="#92400e" font-size="10" text-anchor="middle">run_bash(command)</text><path fill="none" stroke="#d97706" stroke-dasharray="6 3" stroke-width="1.5" marker-end="url(#arrow)" d="M 290 418 L 40 418 L 40 188 L 58 188"/><text x="18" y="375" fill="#92400e" font-size="10" font-weight="500" transform="rotate(-90, 18, 375)">追加 tool_result 到 messages</text><rect width="600" height="48" x="60" y="462" fill="#f1f5f9" rx="6"/><text x="80" y="482" fill="#334155" font-size="10">核心：一个</text><text x="148" y="482" fill="#1e3a5f" font-family="monospace" font-size="10" font-weight="700">while True</text><text x="220" y="482" fill="#334155" font-size="10">循环。模型调工具 → 执行 → 喂回 → 再问。不调工具就停。</text><text x="80" y="500" fill="#64748b" font-size="10">后续所有章节都在这个循环上叠加机制。</text></svg>