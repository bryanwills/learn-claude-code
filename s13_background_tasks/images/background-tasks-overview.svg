<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 760 440"><defs><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#ea580c"/></linearGradient><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#555" d="M 0 0 L 10 5 L 0 10 z"/></marker><marker id="arrow-orange" markerHeight="7" markerWidth="7" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#ea580c" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs><rect width="760" height="440" fill="#fafbfc" rx="8"/><rect width="760" height="44" x="0" y="0" fill="url(#header)" rx="8"/><rect width="760" height="8" x="0" y="36" fill="url(#header)"/><text x="380" y="28" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Background Tasks — 慢操作丢后台，Agent 继续思考</text><rect width="12" height="10" x="40" y="56" fill="#f0f4ff" stroke="#2563eb" stroke-width="1" rx="2"/><text x="58" y="66" fill="#2563eb" font-size="10" font-weight="600">s12 保留</text><rect width="12" height="10" x="140" y="56" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="2"/><text x="158" y="66" fill="#ea580c" font-size="10" font-weight="600">s13 新增</text><rect width="80" height="40" x="30" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="70" y="110" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">messages</text><line x1="110" x2="128" y1="106" y2="106" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="120" height="52" x="131" y="80" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="191" y="102" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">prompt + cache</text><text x="191" y="116" fill="#94a3b8" font-size="8" text-anchor="middle">(s10-s12)</text><line x1="251" x2="269" y1="106" y2="106" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="100" height="52" x="272" y="80" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="322" y="102" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">LLM call</text><text x="322" y="116" fill="#94a3b8" font-size="8" text-anchor="middle">(s11 retry)</text><line x1="372" x2="390" y1="106" y2="106" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="210" height="60" x="393" y="76" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="498" y="94" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">TOOL DISPATCH</text><text x="408" y="110" fill="#2563eb" font-size="9">fast? → 同步执行 (s12)</text><text x="408" y="124" fill="#ea580c" font-size="9" font-weight="600">slow? → run_in_background ★</text><path fill="none" stroke="#555" stroke-dasharray="6 3" stroke-width="1.5" marker-end="url(#arrow)" d="M 603 106 L 640 106 L 640 148 L 70 148 L 70 126"/><rect width="310" height="80" x="40" y="172" fill="#fff7ed" stroke="#ea580c" stroke-width="2" rx="8"/><text x="195" y="194" fill="#9a3412" font-size="11" font-weight="700" text-anchor="middle">后台线程执行</text><text x="60" y="212" fill="#ea580c" font-size="9">run_in_background(tool_use_id, fn, *args)</text><text x="60" y="226" fill="#6b7280" font-size="8">threading.Thread(target=worker, daemon=True)</text><text x="60" y="240" fill="#6b7280" font-size="8">结果 → background_results[id] (threading.Lock 保护)</text><path fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)" d="M 440 136 L 440 158 L 250 158 L 250 172"/><text x="320" y="170" fill="#ea580c" font-size="9">slow op</text><rect width="330" height="80" x="390" y="172" fill="#fff7ed" stroke="#ea580c" stroke-width="2" rx="8"/><text x="555" y="194" fill="#9a3412" font-size="11" font-weight="700" text-anchor="middle">通知注入</text><text x="408" y="212" fill="#ea580c" font-size="9">collect_background_results() 每轮检查</text><text x="408" y="226" fill="#6b7280" font-size="8">已完成 → tool_result 注入 messages</text><text x="408" y="240" fill="#6b7280" font-size="8">未完成 → &quot;[Running in background...]&quot; 占位</text><path fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)" d="M 350 220 L 390 220"/><rect width="680" height="48" x="40" y="274" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><text x="60" y="296" fill="#1e3a5f" font-size="11" font-weight="600">启发式判断:</text><rect width="56" height="18" x="155" y="284" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" rx="4"/><text x="183" y="297" fill="#16a34a" font-size="9" text-anchor="middle">fast</text><text x="218" y="297" fill="#475569" font-size="9">read_file · git status · glob</text><rect width="56" height="18" x="360" y="284" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="4"/><text x="388" y="297" fill="#ea580c" font-size="9" text-anchor="middle">slow</text><text x="423" y="297" fill="#475569" font-size="9">npm install · pip install · pytest (timeout &gt; 30s)</text><rect width="330" height="84" x="40" y="340" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="6"/><text x="205" y="360" fill="#991b1b" font-size="10" font-weight="700" text-anchor="middle">s12 同步阻塞</text><rect width="80" height="14" x="60" y="370" fill="#dbeafe" stroke="#2563eb" stroke-width="1" rx="3"/><text x="100" y="381" fill="#1e40af" font-size="8" text-anchor="middle">思考</text><rect width="160" height="14" x="145" y="370" fill="#fecaca" stroke="#dc2626" stroke-width="1" rx="3"/><text x="225" y="381" fill="#991b1b" font-size="8" text-anchor="middle">等 bash 3 分钟...</text><rect width="40" height="14" x="310" y="370" fill="#dbeafe" stroke="#2563eb" stroke-width="1" rx="3"/><text x="330" y="381" fill="#1e40af" font-size="7" text-anchor="middle">继续</text><text x="60" y="410" fill="#991b1b" font-size="9">总耗时 ~3min，Agent 空 etc. 等了 3 分钟</text><rect width="330" height="84" x="390" y="340" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" rx="6"/><text x="555" y="360" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">s13 后台执行</text><rect width="80" height="14" x="410" y="370" fill="#dbeafe" stroke="#2563eb" stroke-width="1" rx="3"/><text x="450" y="381" fill="#1e40af" font-size="8" text-anchor="middle">思考</text><rect width="100" height="14" x="495" y="370" fill="#dcfce7" stroke="#16a34a" stroke-width="1" rx="3"/><text x="545" y="381" fill="#166534" font-size="8" text-anchor="middle">继续做别的事</text><rect width="100" height="14" x="600" y="370" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="3"/><text x="650" y="381" fill="#ea580c" font-size="8" text-anchor="middle">通知: 结果来了</text><text x="410" y="410" fill="#166534" font-size="9">总耗时 ~3min，但 Agent 没闲着</text></svg>