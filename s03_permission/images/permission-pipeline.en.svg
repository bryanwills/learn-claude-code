<svg xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" viewBox="0 0 720 280"><defs><linearGradient id="header" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#2563eb"/></linearGradient><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto-start-reverse" refX="10" refY="5" viewBox="0 0 10 10"><path fill="#555" d="M 0 0 L 10 5 L 0 10 z"/></marker></defs><rect width="720" height="280" fill="#fafbfc" rx="8"/><rect width="720" height="38" x="0" y="0" fill="url(#header)" rx="8"/><rect width="720" height="8" x="0" y="30" fill="url(#header)"/><text x="360" y="25" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Permission Pipeline — Three Gates</text><rect width="120" height="36" x="40" y="62" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="6"/><text x="100" y="84" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">Tool call enters</text><line x1="160" x2="210" y1="80" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="145" height="48" x="214" y="56" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/><text x="286" y="76" fill="#991b1b" font-size="11" font-weight="700" text-anchor="middle">Gate 1: Deny List</text><text x="286" y="94" fill="#991b1b" font-size="9" text-anchor="middle">rm -rf /, sudo, shutdown</text><line x1="359" x2="409" y1="80" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="145" height="48" x="413" y="56" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="6"/><text x="485" y="76" fill="#92400e" font-size="11" font-weight="700" text-anchor="middle">Gate 2: Rule Matching</text><text x="485" y="94" fill="#92400e" font-size="9" text-anchor="middle">Write outside ws? Destructive?</text><text x="485" y="116" fill="#166534" font-size="8" font-weight="600" text-anchor="middle">no match → allow</text><line x1="558" x2="608" y1="80" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><text x="583" y="72" fill="#92400e" font-size="8" font-weight="600" text-anchor="middle">match</text><rect width="90" height="48" x="612" y="56" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="6"/><text x="657" y="76" fill="#92400e" font-size="11" font-weight="700" text-anchor="middle">Gate 3</text><text x="657" y="94" fill="#92400e" font-size="9" text-anchor="middle">User approval</text><text x="657" y="116" fill="#64748b" font-size="8" font-weight="600" text-anchor="middle">allow / deny</text><rect width="662" height="130" x="40" y="130" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="6"/><text x="60" y="152" fill="#1e3a5f" font-size="12" font-weight="600">Three Decisions</text><rect width="200" height="42" x="60" y="166" fill="#fee2e2" stroke="#fca5a5" stroke-width=".5" rx="4"/><text x="160" y="184" fill="#991b1b" font-size="11" font-weight="600" text-anchor="middle">Deny</text><text x="160" y="200" fill="#991b1b" font-size="9" text-anchor="middle">Gate 1 hit, or user denied</text><rect width="200" height="42" x="280" y="166" fill="#fef3c7" stroke="#fbbf24" stroke-width=".5" rx="4"/><text x="380" y="184" fill="#92400e" font-size="11" font-weight="600" text-anchor="middle">Ask</text><text x="380" y="200" fill="#92400e" font-size="9" text-anchor="middle">Gate 2 matched, enter Gate 3</text><rect width="182" height="42" x="500" y="166" fill="#dcfce7" stroke="#86efac" stroke-width=".5" rx="4"/><text x="591" y="184" fill="#166534" font-size="11" font-weight="600" text-anchor="middle">Allow</text><text x="591" y="200" fill="#166534" font-size="9" text-anchor="middle">No rule hit, or user approved</text><text x="371" y="248" fill="#64748b" font-size="10" text-anchor="middle">Priority: hard deny → rule matching → if matched ask user; if unmatched allow by default</text></svg>