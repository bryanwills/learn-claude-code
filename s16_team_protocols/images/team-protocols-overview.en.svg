 rx="8"/><text x="55" y="114" fill="#4f46e5" font-size="8" font-weight="600" text-anchor="middle">turn</text><line x1="90" x2="104" y1="110" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="70" height="40" x="107" y="90" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="142" y="114" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">messages</text><line x1="177" x2="191" y1="110" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="80" height="48" x="194" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="234" y="114" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">prompt</text><line x1="274" x2="288" y1="110" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="70" height="48" x="291" y="86" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="326" y="114" fill="#1e3a5f" font-size="9" font-weight="600" text-anchor="middle">LLM</text><line x1="361" x2="375" y1="110" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="356" height="60" x="378" y="80" fill="#f0f4ff" stroke="#2563eb" stroke-width="1.5" rx="8"/><text x="556" y="98" fill="#1e3a5f" font-size="10" font-weight="600" text-anchor="middle">TOOL DISPATCH (core tool set)</text><text x="394" y="114" fill="#2563eb" font-size="8">bash · read · write · task(4) · spawn · send · inbox</text><text x="394" y="128" fill="#7c3aed" font-size="8" font-weight="700">★ request_shutdown · request_plan · review_plan</text><path fill="none" stroke="#94a3b8" stroke-dasharray="5 4" stroke-width="1" marker-end="url(#arrow)" d="M 734 110 L 748 110 L 748 150 L 55 150 L 55 130"/><rect width="700" height="100" x="30" y="176" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" rx="8"/><text x="380" y="196" fill="#4c1d95" font-size="11" font-weight="700" text-anchor="middle">Request-Response Protocol Flow (request_id throughout)</text><rect width="130" height="52" x="50" y="208" fill="#fff" stroke="#7c3aed" stroke-width="1" rx="6"/><text x="115" y="226" fill="#7c3aed" font-size="9" font-weight="600" text-anchor="middle">① Lead sends request</text><text x="115" y="240" fill="#6b7280" font-size="7" text-anchor="middle">BUS.send(&quot;shutdown_request&quot;</text><text x="115" y="252" fill="#6b7280" font-size="7" text-anchor="middle">metadata={request_id})</text><line x1="180" x2="206" y1="234" y2="234" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/><rect width="130" height="52" x="209" y="208" fill="#fff" stroke="#7c3aed" stroke-width="1" rx="6"/><text x="274" y="226" fill="#7c3aed" font-size="9" font-weight="600" text-anchor="middle">② Teammate receives</text><text x="274" y="240" fill="#6b7280" font-size="7" text-anchor="middle">dispatch_by_type(inbox)</text><text x="274" y="252" fill="#6b7280" font-size="7" text-anchor="middle">→ handler(type, metadata)</text><line x1="339" x2="365" y1="234" y2="234" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/><rect width="130" height="52" x="368" y="208" fill="#fff" stroke="#7c3aed" stroke-width="1" rx="6"/><text x="433" y="226" fill="#7c3aed" font-size="9" font-weight="600" text-anchor="middle">③ Teammate responds</text><text x="433" y="240" fill="#6b7280" font-size="7" text-anchor="middle">BUS.send(&quot;shutdown_response&quot;</text><text x="433" y="252" fill="#6b7280" font-size="7" text-anchor="middle">same request_id + approve)</text><line x1="498" x2="524" y1="234" y2="234" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/><rect width="130" height="52" x="527" y="208" fill="#fff" stroke="#7c3aed" stroke-width="1" rx="6"/><text x="592" y="226" fill="#7c3aed" font-size="9" font-weight="600" text-anchor="middle">④ Lead receives</text><text x="592" y="240" fill="#6b7280" font-size="7" text-anchor="middle">match_response(request_id)</text><text x="592" y="252" fill="#6b7280" font-size="7" text-anchor="middle">→ resolve/reject callback</text><rect width="340" height="85" x="30" y="296" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" rx="8"/><text x="200" y="316" fill="#4c1d95" font-size="10" font-weight="700" text-anchor="middle">State Machine (same for both protocols)</text><rect width="58" height="20" x="55" y="330" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" rx="4"/><text x="84" y="344" fill="#475569" font-size="9" text-anchor="middle">pending</text><line x1="113" x2="192" y1="340" y2="340" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/><text x="152" y="335" fill="#16a34a" font-size="8" font-weight="600" text-anchor="middle">approve</text><rect width="62" height="20" x="192" y="330" fill="#dcfce7" stroke="#16a34a" stroke-width="1" rx="4"/><text x="223" y="344" fill="#166534" font-size="9" text-anchor="middle">approved</text><path fill="none" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)" d="M 84 350 L 84 368 L 128 368"/><text x="76" y="362" fill="#dc2626" font-size="8" font-weight="600" text-anchor="end">reject</text><rect width="60" height="20" x="128" y="358" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="4"/><text x="158" y="372" fill="#991b1b" font-size="9" text-anchor="middle">rejected</text><rect width="330" height="85" x="400" y="296" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" rx="8"/><text x="565" y="316" fill="#4c1d95" font-size="10" font-weight="700" text-anchor="middle">pending_requests Storage</text><text x="420" y="336" fill="#7c3aed" font-size="9">pending_requests: dict[str, ProtocolState]</text><text x="420" y="352" fill="#6b7280" font-size="8">request_id → {type, sender, status, created_at}</text><text x="420" y="368" fill="#6b7280" font-size="8">match_response: find request by request_id</text><rect width="700" height="48" x="30" y="396" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><text x="55" y="416" fill="#1e3a5f" font-size="10" font-weight="600">Two protocols, one mechanism:</text><rect width="130" height="18" x="230" y="406" fill="#fef3c7" stroke="#d97706" stroke-width="1" rx="4"/><text x="295" y="419" fill="#92400e" font-size="9" text-anchor="middle">shutdown_request</text><text x="368" y="419" fill="#475569" font-size="10">and</text><rect width="140" height="18" x="390" y="406" fill="#dbeafe" stroke="#2563eb" stroke-width="1" rx="4"/><text x="460" y="419" fill="#1e40af" font-size="9" text-anchor="middle">plan_approval_request</text><text x="540" y="419" fill="#475569" font-size="10">share the same pending→approved/rejected FSM</text><text x="55" y="436" fill="#6b7280" font-size="8">New protocol type = new msg_type, no new state machine. request_id links request and response.</text><rect width="700" height="28" x="30" y="460" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/><rect width="12" height="10" x="50" y="470" fill="#f0f4ff" stroke="#2563eb" stroke-width="1" rx="2"/><text x="70" y="480" fill="#475569" font-size="10">s15: MessageBus + spawn_teammate + inbox</text><rect width="12" height="10" x="310" y="470" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1" rx="2"/><text x="330" y="480" fill="#475569" font-size="10">s16: request_id protocol + dispatch + pending_requests + state machine</text></svg>